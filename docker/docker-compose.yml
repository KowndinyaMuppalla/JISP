networks:
  jisp_net:
    driver: bridge

volumes:
  pgdata:
  geoserver_data:
  ollama_models:

services:

  db:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: jisp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-jisp}
      POSTGRES_USER:     ${POSTGRES_USER:-jisp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jisp_secret}
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ../spatial/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jisp} -d ${POSTGRES_DB:-jisp}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [jisp_net]

  geoserver:
    image: kartoza/geoserver:2.24.2
    container_name: jisp_geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER:     ${GEOSERVER_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_PASS:-geoserver}
      GEOSERVER_DATA_DIR:       /opt/geoserver/data_dir
      INITIAL_MEMORY:           "512m"
      MAXIMUM_MEMORY:           "1g"
      STABLE_EXTENSIONS:        "vectortiles-plugin"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/geoserver/web/ | grep -q 200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks: [jisp_net]

  ollama:
    image: ollama/ollama:latest
    container_name: jisp_ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 8 && ollama pull llama3.2 && wait"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q llama3.2 || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 20
    networks: [jisp_net]

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: jisp_api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER:-jisp}:${POSTGRES_PASSWORD:-jisp_secret}@db:5432/${POSTGRES_DB:-jisp}
      OLLAMA_HOST:    http://ollama:11434
      OLLAMA_MODEL:   llama3.2
      GEOSERVER_URL:  http://geoserver:8080/geoserver
      GEOSERVER_USER: ${GEOSERVER_USER:-admin}
      GEOSERVER_PASS: ${GEOSERVER_PASS:-geoserver}
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks: [jisp_net]

  ui:
    image: nginx:alpine
    container_name: jisp_ui
    restart: unless-stopped
    volumes:
      - ../ui/map:/usr/share/nginx/html:ro
      - ../ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on: [api]
    networks: [jisp_net]
