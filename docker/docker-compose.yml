# JISP local-only stack for Docker Desktop.
#
# Services:
#   - `ollama`       : Ollama server (CPU by default; GPU via override file)
#   - `ollama-init`  : one-shot sidecar that pulls the reasoning model on first boot
#   - `api`          : JISP FastAPI service (built from docker/api.Dockerfile)
#   - `ui`           : Streamlit management demo (built from docker/ui.Dockerfile)
#
# `db` and `geoai` Dockerfiles exist in this folder per the approved
# structure; their compose services will be added in a later step.
#
# Run from the repository root:
#     docker compose -f docker/docker-compose.yml up --build
#
# Environment overrides are read from a `.env` at the repo root
# (see `.env.example`). On first boot the init container pulls the model
# named by $JISP_OLLAMA_MODEL (default: llama3.2, ~2 GB). Subsequent starts
# reuse the `ollama-data` named volume.
#
# GPU acceleration (optional)
# ---------------------------
# The base compose file is CPU-only so it runs on any Windows/Mac/Linux
# Docker Desktop without NVIDIA Container Toolkit. If you do have an
# NVIDIA GPU exposed to Docker, layer the GPU override on top:
#
#     docker compose \\
#       -f docker/docker-compose.yml \\
#       -f docker/docker-compose.gpu.yml \\
#       up --build

services:

  ollama:
    image: ollama/ollama:latest
    container_name: jisp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # One-shot pull of the reasoning model. Exits 0 after the pull
  # completes. The API waits for this to finish before starting so the
  # first /explain call has a real model to talk to.
  ollama-init:
    image: ollama/ollama:latest
    container_name: jisp-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MODEL="${JISP_OLLAMA_MODEL:-llama3.2}"
        echo "[jisp] pulling $$MODEL ..."
        ollama pull "$$MODEL"
        echo "[jisp] $$MODEL ready"
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: jisp-api
    ports:
      - "8000:8000"
    environment:
      JISP_OLLAMA_HOST: http://ollama:11434
      JISP_OLLAMA_MODEL: ${JISP_OLLAMA_MODEL:-llama3.2}
      JISP_OLLAMA_TIMEOUT_SECONDS: ${JISP_OLLAMA_TIMEOUT_SECONDS:-60}
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Streamlit management-demo dashboard. Talks to the API container over
  # the compose network (JISP_API_BASE_URL=http://api:8000), not localhost.
  ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    container_name: jisp-ui
    ports:
      - "8501:8501"
    environment:
      JISP_API_BASE_URL: http://api:8000
      JISP_API_TIMEOUT_SECONDS: ${JISP_API_TIMEOUT_SECONDS:-120}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
